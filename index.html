<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dennis Haeger – Bewerbung</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #e3e8ee, #f7f9fb);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Card */
.container {
    background: white;
    padding: 40px;
    border-radius: 18px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.12);
    text-align: center;
    max-width: 420px;
    width: 90%;
}

/* Profilbild */
.profile-img {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    object-fit: cover;
    margin-bottom: 15px;
    border: 3px solid #eaeaea;
}

/* Name */
h1 {
    margin: 10px 0 8px;
}

/* Text */
p {
    color: #555;
    font-size: 15px;
    line-height: 1.5;
}

/* Buttons */
.button {
    display: block;
    margin: 12px 0;
    padding: 14px;
    border-radius: 10px;
    text-decoration: none;
    color: white;
    font-weight: bold;
    transition: all 0.2s ease;
}

.button:hover {
    transform: translateY(-2px);
}

/* Farben */
.btn-main { background: #1a73e8; }
.btn-main:hover { background: #155ab6; }

.btn-dark { background: #333; }
.btn-dark:hover { background: #111; }

.btn-green { background: #0f9d58; }
.btn-green:hover { background: #0b7d45; }

/* Kontakt */
.contact {
    margin-top: 20px;
    font-size: 14px;
    color: #777;
}

.contact a {
    color: #1a73e8;
    text-decoration: none;
}

.contact a:hover {
    text-decoration: underline;
}
</style>

</head>
<body>

<div class="container">

    <!-- DEIN BILD HIER -->
    <img src="https://github.com/Kodireporter/bewerbung/blob/main/profilbild.png" alt="Profilbild" class="profile-img">

    <h1>Dennis Haeger</h1>

    <p>
        Engagierter Mitarbeiter im Verkauf & Kundenservice mit technischem Verständnis.<br>
        Belastbar, lösungsorientiert und zuverlässig – auch in stressigen Situationen.
    </p>

    <a class="button btn-main" href="https://kodireporter.xo.je/lebenslauf.html" target="_blank">
        📄 Lebenslauf ansehen
    </a>

    <a class="button btn-dark" href="https://github.com/Kodireporter" target="_blank">
        💻 GitHub Projekte
    </a>

    <a class="button btn-green" href="https://kodireporter.xo.je" target="_blank">
        🌐 Eigene Projekte
    </a>

    <div class="contact">
        📧 <a href="mailto:haegerdennis13@gmail.com">haegerdennis13@gmail.com</a>
    </div>

</div>

</body>
</html>
